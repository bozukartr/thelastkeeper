<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>The Last Keeper</title>
<style>
:root {
  --bg:#F0EAE1; --bg2:#E8E0D5; --surface:#DDD4C8; --surface2:#CFC4B5;
  --divider:#BFB3A2; --ink:#2A2018; --ink2:#6E5F50; --ink3:#A0917F;
  --accent:#8B6A3E; --accent-lt:#C4A06A; --accent-fill:rgba(139,106,62,0.10);
  --cell-on:#C8964A; --cell-bdr:#A87830; --hint:#6A8B6A; --danger:#9B4A2A;
  --r-sm:9px; --r-md:13px; --r-lg:18px; --r-xl:24px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{height:100%;overflow:hidden;background:var(--bg);
  font-family:-apple-system,"SF Pro Text","Helvetica Neue",sans-serif;
  color:var(--ink);user-select:none;-webkit-user-select:none;-webkit-font-smoothing:antialiased;}

/* SCREENS */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  padding:max(env(safe-area-inset-top),24px) max(env(safe-area-inset-right),20px)
          max(env(safe-area-inset-bottom),28px) max(env(safe-area-inset-left),20px);
  opacity:0;pointer-events:none;transition:opacity 0.28s ease;overflow-y:auto;}
.screen.active{opacity:1;pointer-events:all;}

/* MENU */
#screen-menu{justify-content:space-between;background:var(--bg);}
.menu-top{width:100%;max-width:340px;padding-top:8px;}
.menu-eyebrow{font-size:11px;font-weight:500;letter-spacing:0.08em;color:var(--ink3);
  text-transform:uppercase;margin-bottom:6px;}
.menu-title{font-size:38px;font-weight:700;letter-spacing:-0.03em;color:var(--ink);
  line-height:1.05;margin-bottom:6px;}
.menu-tagline{font-size:15px;color:var(--ink2);line-height:1.45;max-width:280px;}
.lighthouse{flex:1;display:flex;align-items:center;justify-content:center;width:100%;}
.lh-wrap{position:relative;width:120px;height:180px;}
.lh-tower{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:44px;height:130px;
  background:linear-gradient(180deg,var(--surface) 0%,var(--surface2) 100%);border-radius:4px 4px 0 0;}
.lh-tower::before{content:'';position:absolute;inset:0;border-radius:inherit;
  background:repeating-linear-gradient(180deg,transparent 0px,transparent 18px,
  rgba(139,106,62,0.18) 18px,rgba(139,106,62,0.18) 24px);}
.lh-room{position:absolute;bottom:130px;left:50%;transform:translateX(-50%);
  width:54px;height:30px;background:var(--surface);border-radius:4px;
  display:flex;align-items:center;justify-content:center;}
.lh-light{width:22px;height:22px;border-radius:50%;background:var(--cell-on);
  box-shadow:0 0 20px 8px rgba(200,150,74,0.35);animation:lh-pulse 2.4s ease-in-out infinite;}
@keyframes lh-pulse{0%,100%{box-shadow:0 0 20px 8px rgba(200,150,74,0.35);}
  50%{box-shadow:0 0 36px 16px rgba(200,150,74,0.55);}}
.lh-cap{position:absolute;bottom:160px;left:50%;transform:translateX(-50%);
  width:0;height:0;border-left:28px solid transparent;border-right:28px solid transparent;
  border-bottom:20px solid var(--surface2);}
.lh-base{position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:60px;height:12px;background:var(--surface2);border-radius:4px;}
.lh-sea{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);
  width:130px;height:12px;background:var(--surface);border-radius:100px;opacity:0.6;}
.menu-cards{width:100%;max-width:340px;display:flex;flex-direction:column;gap:10px;}
.menu-card{background:var(--surface);border-radius:var(--r-lg);padding:18px 20px;
  cursor:pointer;transition:opacity 0.12s;position:relative;overflow:hidden;}
.menu-card:active{opacity:0.7;}
.menu-card-tag{font-size:10px;font-weight:600;letter-spacing:0.1em;
  text-transform:uppercase;color:var(--accent);margin-bottom:4px;}
.menu-card-title{font-size:19px;font-weight:700;letter-spacing:-0.01em;color:var(--ink);margin-bottom:3px;}
.menu-card-sub{font-size:13px;color:var(--ink2);line-height:1.4;}
.menu-card-arrow{position:absolute;right:18px;top:50%;transform:translateY(-50%);
  font-size:20px;color:var(--accent-lt);}

/* LEVEL SELECT */
#screen-levels{background:var(--bg);justify-content:flex-start;gap:0;}
.screen-nav{width:100%;max-width:380px;display:flex;align-items:center;
  gap:12px;margin-bottom:16px;flex-shrink:0;}
.screen-nav-title{font-size:17px;font-weight:600;color:var(--ink);letter-spacing:-0.01em;flex:1;}
.stars-badge{font-size:13px;font-weight:700;color:var(--accent);
  background:var(--accent-fill);padding:4px 10px;border-radius:100px;}
.chapters-wrap{width:100%;max-width:380px;display:flex;flex-direction:column;gap:16px;
  padding-bottom:8px;}
.ch-section{}
.ch-header{background:var(--surface);border-radius:var(--r-md);
  padding:12px 14px;margin-bottom:8px;}
.ch-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.ch-name{font-size:14px;font-weight:700;color:var(--ink);}
.ch-meta{font-size:12px;color:var(--ink3);}
.ch-stars{font-size:12px;font-weight:600;color:var(--accent);}
.ch-gate{font-size:12px;color:var(--danger);margin-top:5px;display:flex;
  align-items:center;gap:5px;}
.ch-gate-need{font-weight:700;}
.lvl-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.lvl-btn{border-radius:var(--r-md);background:var(--surface);min-height:60px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:5px;cursor:pointer;transition:opacity 0.12s;position:relative;}
.lvl-btn:active{opacity:0.7;}
.lvl-btn.locked{opacity:0.32;pointer-events:none;}
.lvl-btn.done3{box-shadow:inset 0 0 0 2px var(--accent);}
.lvl-btn.curr{box-shadow:inset 0 0 0 2px var(--accent-lt);}
.lvl-num{font-size:16px;font-weight:700;color:var(--ink);}
.lvl-lock{font-size:11px;color:var(--ink3);}
.lvl-stars{display:flex;gap:3px;}
.lvl-dot{width:6px;height:6px;border-radius:50%;background:var(--divider);}
.lvl-dot.on{background:var(--accent-lt);}

/* GAME */
#screen-game{background:var(--bg);gap:12px;justify-content:space-between;}
.game-nav{width:100%;max-width:340px;display:flex;align-items:center;justify-content:space-between;}
.game-nav-left{display:flex;align-items:center;gap:10px;}
.game-lev-info{display:flex;flex-direction:column;}
.game-ch-tag{font-size:10px;font-weight:600;letter-spacing:0.08em;
  text-transform:uppercase;color:var(--accent);}
.game-lev-tag{font-size:13px;font-weight:600;color:var(--ink2);}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--surface);border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:15px;color:var(--ink2);transition:opacity 0.12s;}
.icon-btn:active{opacity:0.6;}
.par-badge{font-size:12px;font-weight:600;padding:4px 10px;border-radius:100px;
  background:var(--surface);color:var(--ink2);transition:background 0.3s,color 0.3s;}
.par-badge.under{background:rgba(106,139,106,0.15);color:var(--hint);}
.par-badge.at{background:rgba(139,106,62,0.12);color:var(--accent);}
.par-badge.over{background:rgba(155,74,42,0.10);color:var(--danger);}
.stats{display:flex;gap:8px;width:100%;max-width:340px;}
.stat-card{flex:1;background:var(--surface);border-radius:var(--r-md);padding:9px 6px 8px;text-align:center;}
.stat-label{font-size:10px;font-weight:500;color:var(--ink3);text-transform:uppercase;
  letter-spacing:0.05em;margin-bottom:2px;}
.stat-value{font-size:21px;font-weight:700;color:var(--ink);letter-spacing:-0.02em;line-height:1;}
.stat-value.hi{color:var(--accent);}
.progress-wrap{width:100%;max-width:340px;height:3px;border-radius:2px;
  background:var(--divider);overflow:hidden;}
.progress-bar{height:100%;border-radius:2px;background:var(--accent);transition:width 0.3s ease;}
.grid-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;}
#grid{display:grid;background:var(--surface);border-radius:var(--r-lg);}
.cell{border-radius:var(--r-sm);background:var(--surface2);cursor:pointer;
  transition:background 0.14s ease,box-shadow 0.14s ease;-webkit-touch-callout:none;position:relative;}
.cell::after{content:'';position:absolute;inset:0;border-radius:inherit;
  border-top:1px solid rgba(255,255,255,0.38);border-bottom:1px solid rgba(0,0,0,0.07);pointer-events:none;}
.cell.on{background:var(--cell-on);box-shadow:0 1px 4px rgba(139,106,62,0.28),0 0 0 1px var(--cell-bdr);}
.cell.on::after{border-top-color:rgba(255,255,255,0.55);}
.cell.hint-cell{box-shadow:0 0 0 2.5px var(--hint);}
.cell.hint-cell.on{box-shadow:0 1px 4px rgba(139,106,62,0.22),0 0 0 2.5px var(--hint);}
@keyframes tap-dim{0%{opacity:0.5}100%{opacity:1}}
.cell.tap-dim{animation:tap-dim 0.16s ease-out forwards;}
@keyframes cell-in{from{opacity:0;transform:scale(0.88);}to{opacity:1;transform:scale(1);}}
.cell-in{animation:cell-in 0.22s cubic-bezier(0.34,1.3,0.64,1) both;}
@keyframes win-glow{
  0%,100%{background:var(--cell-on);box-shadow:0 1px 4px rgba(139,106,62,0.28),0 0 0 1px var(--cell-bdr);}
  50%{background:#D8A44E;box-shadow:0 2px 14px rgba(180,130,50,0.45),0 0 0 1px var(--cell-bdr);}}
.win-pulse .cell.on{animation:win-glow 1s ease-in-out infinite;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.shake{animation:shake 0.28s ease;}
.controls{display:flex;gap:8px;width:100%;max-width:340px;}
.btn{flex:1;height:50px;border:none;border-radius:var(--r-md);
  font-family:-apple-system,"SF Pro Text","Helvetica Neue",sans-serif;
  font-size:15px;font-weight:600;-webkit-font-smoothing:antialiased;
  cursor:pointer;transition:opacity 0.1s;display:flex;align-items:center;justify-content:center;}
.btn:active{opacity:0.55;}
.btn-primary{background:var(--accent);color:#FBF5EC;}
.btn-secondary{background:var(--surface);color:var(--ink2);}
.btn-secondary.hinting{color:var(--hint);box-shadow:inset 0 0 0 1.5px var(--hint);}
.btn-destructive{background:var(--surface);color:var(--danger);}
.hint-count{font-size:12px;font-weight:700;margin-left:5px;color:var(--accent-lt);}
.hint-count.empty{color:var(--danger);}
.undo-count{font-size:12px;font-weight:700;margin-left:5px;color:var(--danger);opacity:0.7;}
.undo-count.empty{opacity:1;}
.store-tabs{display:flex;gap:6px;margin-bottom:14px;}
.store-tab{flex:1;height:38px;border:none;border-radius:var(--r-md);
  font-family:-apple-system,"SF Pro Text","Helvetica Neue",sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--ink2);transition:background 0.2s,color 0.2s;}
.store-tab.active{background:var(--accent);color:#FBF5EC;}

/* OVERLAYS */
.overlay{position:fixed;inset:0;background:rgba(240,234,225,0.75);
  backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);
  display:flex;align-items:flex-end;justify-content:center;z-index:100;
  opacity:0;pointer-events:none;transition:opacity 0.25s;
  padding:0 0 max(env(safe-area-inset-bottom),0px);}
.overlay.show{opacity:1;pointer-events:all;}
.sheet{background:var(--bg);border-radius:var(--r-xl) var(--r-xl) 0 0;
  width:100%;max-width:420px;padding:12px 24px max(env(safe-area-inset-bottom),28px);
  transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);}
.overlay.show .sheet{transform:translateY(0);}
.sheet-handle{width:36px;height:5px;border-radius:3px;background:var(--divider);margin:0 auto 18px;}
.sheet-icon{font-size:38px;text-align:center;display:block;margin-bottom:6px;}
.sheet-title{font-size:22px;font-weight:700;letter-spacing:-0.02em;text-align:center;margin-bottom:4px;}
.sheet-sub{font-size:14px;color:var(--ink2);text-align:center;margin-bottom:12px;}
.sheet-group{background:var(--surface);border-radius:var(--r-md);overflow:hidden;margin-bottom:14px;}
.sheet-row{display:flex;justify-content:space-between;align-items:center;
  padding:13px 16px;border-bottom:1px solid var(--divider);font-size:15px;}
.sheet-row:last-child{border-bottom:none;}
.sheet-row span:first-child{color:var(--ink);}
.sheet-row span:last-child{color:var(--accent);font-weight:600;}
.par-under{color:var(--hint)!important;}
.par-at{color:var(--accent)!important;}
.par-over{color:var(--danger)!important;}

/* WIN STARS */
.win-stars-row{display:flex;gap:10px;justify-content:center;margin-bottom:14px;}
.win-star{font-size:38px;opacity:0;transform:scale(0.4) rotate(-15deg);
  transition:none;line-height:1;}
.win-star.lit{animation:star-pop 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards;}
@keyframes star-pop{
  from{opacity:0;transform:scale(0.4) rotate(-15deg);}
  to{opacity:1;transform:scale(1) rotate(0deg);}}
.win-bonus{font-size:13px;font-weight:600;color:var(--hint);text-align:center;
  margin-bottom:12px;display:none;}
.win-btn-row{display:flex;gap:8px;}

/* IAP STORE */
.iap-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.iap-row{background:var(--surface);border-radius:var(--r-md);padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:opacity 0.12s;}
.iap-row:active{opacity:0.7;}
.iap-row.processing,.iap-row.success{pointer-events:none;}
.iap-info{display:flex;flex-direction:column;gap:2px;}
.iap-label{font-size:16px;font-weight:700;color:var(--ink);letter-spacing:-0.01em;}
.iap-bonus{color:var(--hint);font-weight:600;font-style:normal;}
.iap-right{display:flex;align-items:center;gap:6px;}
.iap-price{font-size:15px;font-weight:700;color:var(--accent);}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{display:none;width:16px;height:16px;border-radius:50%;
  border:2.5px solid var(--divider);border-top-color:var(--accent);animation:spin 0.7s linear infinite;}
.iap-row.processing .spinner{display:block;}
.iap-row.processing .iap-price{display:none;}
.success-check{display:none;font-size:17px;color:var(--hint);}
.iap-row.success .iap-price{display:none;}
.iap-row.success .success-check{display:block;}

/* TOAST */
.toast{position:fixed;top:max(env(safe-area-inset-top),16px);
  left:50%;transform:translateX(-50%) translateY(-56px);
  background:var(--ink);color:var(--bg);
  font-family:-apple-system,"SF Pro Text","Helvetica Neue",sans-serif;
  font-size:13px;font-weight:500;padding:9px 18px;border-radius:100px;z-index:300;
  transition:transform 0.25s cubic-bezier(0.32,0.72,0,1);white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.alt{background:var(--hint);color:#fff;}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- MENU -->
<div class="screen active" id="screen-menu">
  <div class="menu-top">
    <div class="menu-eyebrow">A puzzle game</div>
    <div class="menu-title">The Last<br>Keeper</div>
    <div class="menu-tagline">Duty is over. Turn all the lights off!</div>
  </div>
  <div class="lighthouse">
    <div class="lh-wrap">
      <div class="lh-cap"></div>
      <div class="lh-room"><div class="lh-light"></div></div>
      <div class="lh-tower"></div><div class="lh-base"></div><div class="lh-sea"></div>
    </div>
  </div>
  <div class="menu-cards">
    <div class="menu-card" id="menu-play-btn">
      <div class="menu-card-tag">50 Levels · 5 Chapters</div>
      <div class="menu-card-title" id="menu-card-title">Play</div>
      <div class="menu-card-sub" id="menu-card-sub">Begin your journey</div>
      <div class="menu-card-arrow">›</div>
    </div>
  </div>
</div>

<!-- LEVEL SELECT -->
<div class="screen" id="screen-levels">
  <div class="screen-nav">
    <button class="icon-btn" id="lev-back">‹</button>
    <div class="screen-nav-title">Levels</div>
    <div class="stars-badge" id="lev-stars-badge">★ 0 / 150</div>
  </div>
  <div class="chapters-wrap" id="chapters-wrap"></div>
</div>

<!-- GAME -->
<div class="screen" id="screen-game">
  <div class="game-nav">
    <div class="game-nav-left">
      <button class="icon-btn" id="game-back-btn">‹</button>
      <div class="game-lev-info">
        <div class="game-ch-tag" id="game-ch-tag">Chapter 1</div>
        <div class="game-lev-tag" id="game-lev-tag">Level 1</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="icon-btn" id="btn-store" style="font-size:13px;font-weight:700">💡+</button>
      <div class="par-badge" id="par-badge">Par —</div>
    </div>
  </div>
  <div class="stats">
    <div class="stat-card"><div class="stat-label">Moves</div><div class="stat-value" id="moves-display">0</div></div>
    <div class="stat-card"><div class="stat-label">Par</div><div class="stat-value hi" id="par-display">—</div></div>
    <div class="stat-card"><div class="stat-label">Lit</div><div class="stat-value" id="lit-display">0</div></div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
  <div class="grid-wrap"><div id="grid"></div></div>
  <div class="controls">
    <button class="btn btn-secondary" id="btn-hint">Hint<span class="hint-count" id="hint-count">×3</span></button>
    <button class="btn btn-primary" id="btn-restart">Restart</button>
    <button class="btn btn-destructive" id="btn-undo">Undo<span class="undo-count" id="undo-count">×3</span></button>
  </div>
</div>

<!-- WIN SHEET -->
<div class="overlay" id="overlay-win">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="win-stars-row">
      <div class="win-star" id="ws-1">★</div>
      <div class="win-star" id="ws-2">★</div>
      <div class="win-star" id="ws-3">★</div>
    </div>
    <div class="sheet-title" id="win-title">Level Clear</div>
    <div class="sheet-sub" id="win-sub">All lights off</div>
    <div class="win-bonus" id="win-bonus"></div>
    <div class="sheet-group">
      <div class="sheet-row"><span>Moves</span><span id="win-moves">0</span></div>
      <div class="sheet-row"><span>Par</span><span id="win-par-val">—</span></div>
      <div class="sheet-row"><span>Best</span><span id="win-best">—</span></div>
    </div>
    <div class="win-btn-row">
      <button class="btn btn-secondary" id="btn-to-levels">Levels</button>
      <button class="btn btn-primary" id="btn-next">Next</button>
    </div>
  </div>
</div>

<!-- IAP STORE -->
<div class="overlay" id="overlay-store">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Buy Power-ups</div>
    <div class="sheet-sub">Carry over between all levels</div>
    <div class="store-tabs">
      <button class="store-tab active" id="tab-hints">💡 Hints</button>
      <button class="store-tab" id="tab-undos">↩ Undos</button>
    </div>
    <div class="iap-list" id="iap-list"></div>
    <button class="btn btn-secondary" style="width:100%" id="btn-store-close">Cancel</button>
  </div>
</div>

<script>
// ── GF(2) SOLVER ────────────────────────────────────
function buildA(n){
  const sz=n*n;
  return Array.from({length:sz},(_,i)=>{
    const a=new Uint8Array(sz),r=Math.floor(i/n),c=i%n;
    a[i]=1;
    if(r>0)a[(r-1)*n+c]=1;if(r<n-1)a[(r+1)*n+c]=1;
    if(c>0)a[r*n+(c-1)]=1;if(c<n-1)a[r*n+(c+1)]=1;
    return a;
  });
}
function solveGF2(n,flat){
  const sz=n*n;
  const M=buildA(n).map((row,i)=>{const a=new Uint8Array(sz+1);a.set(row);a[sz]=flat[i];return a;});
  const piv=new Int32Array(sz).fill(-1);let row=0;
  for(let col=0;col<sz&&row<sz;col++){
    let f=-1;for(let r=row;r<sz;r++)if(M[r][col]){f=r;break;}
    if(f<0)continue;
    [M[row],M[f]]=[M[f],M[row]];piv[col]=row;
    for(let r=0;r<sz;r++)if(r!==row&&M[r][col])for(let k=col;k<=sz;k++)M[r][k]^=M[row][k];
    row++;
  }
  for(let r=row;r<sz;r++)if(M[r][sz])return null;
  const free=[];for(let c=0;c<sz;c++)if(piv[c]<0)free.push(c);
  const lim=1<<Math.min(free.length,14);let best=null,bc=Infinity;
  for(let mask=0;mask<lim;mask++){
    const x=new Uint8Array(sz);
    for(let f=0;f<free.length;f++)x[free[f]]=(mask>>f)&1;
    for(let col=sz-1;col>=0;col--){
      if(piv[col]<0)continue;
      let v=M[piv[col]][sz];for(let k=col+1;k<sz;k++)v^=M[piv[col]][k]&x[k];x[col]=v&1;
    }
    const cnt=x.reduce((s,v)=>s+v,0);if(cnt<bc){bc=cnt;best=x.slice();}
  }
  return best;
}

// ── SEEDED RNG ───────────────────────────────────────
function seededRng(seed){
  let s=(seed+1)>>>0;
  return ()=>{
    s=Math.imul(s^s>>>15,s|1);
    s^=s+Math.imul(s^s>>>7,s|61);
    return((s^s>>>14)>>>0)/4294967296;
  };
}

// ── LEVEL DEFINITIONS ───────────────────────────────
// { s: gridSize, p: generating presses }
const LEVEL_DEFS=[
  // Ch1: 3×3
  {s:3,p:2},{s:3,p:2},{s:3,p:3},{s:3,p:3},{s:3,p:4},
  {s:3,p:4},{s:3,p:5},{s:3,p:5},{s:3,p:6},{s:3,p:6},
  // Ch2: 4×4
  {s:4,p:4},{s:4,p:5},{s:4,p:5},{s:4,p:6},{s:4,p:6},
  {s:4,p:7},{s:4,p:7},{s:4,p:8},{s:4,p:8},{s:4,p:9},
  // Ch3: 5×5
  {s:5,p:5},{s:5,p:6},{s:5,p:6},{s:5,p:7},{s:5,p:7},
  {s:5,p:8},{s:5,p:8},{s:5,p:9},{s:5,p:9},{s:5,p:10},
  // Ch4: 5×5 harder
  {s:5,p:10},{s:5,p:11},{s:5,p:11},{s:5,p:12},{s:5,p:12},
  {s:5,p:13},{s:5,p:13},{s:5,p:14},{s:5,p:14},{s:5,p:15},
  // Ch5: 5×5 hardest
  {s:5,p:15},{s:5,p:16},{s:5,p:16},{s:5,p:17},{s:5,p:17},
  {s:5,p:18},{s:5,p:18},{s:5,p:19},{s:5,p:19},{s:5,p:20},
];

const CHAPTERS=[
  {name:'The Shore', grid:'3×3', gate:0},
  {name:'The Tower', grid:'4×4', gate:25},
  {name:'The Storm', grid:'5×5', gate:55},
  {name:'The Dark',  grid:'5×5', gate:85},
  {name:'The Light', grid:'5×5', gate:115},
];

function levelGate(lvl1){// 1-based
  if(lvl1<=10)  return 0;
  if(lvl1<=20)  return 25;
  if(lvl1<=30)  return 55;
  if(lvl1<=40)  return 85;
  if(lvl1<=49)  return 115;
  return 145; // level 50
}

// ── PERSISTENCE ──────────────────────────────────────
const SAVE_KEY='lk_save_v2';
function loadSave(){try{return JSON.parse(localStorage.getItem(SAVE_KEY)||'{}');}catch(e){return{};}}
function writeSave(s){localStorage.setItem(SAVE_KEY,JSON.stringify(s));}

let save=loadSave();
if(!save.levelStars)    save.levelStars={};
if(!save.hintPool)      save.hintPool=0;
if(!save.hintsUsed)     save.hintsUsed=0;
if(!save.hintMilestones)save.hintMilestones={};
if(!save.lastDailyHint) save.lastDailyHint=null;
if(!save.undoPool)      save.undoPool=0;
writeSave(save);

function totalStars(){return Object.values(save.levelStars).reduce((a,b)=>a+b,0);}
function calcStars(moves,par){
  const d=moves-par;
  if(d<=3) return 3;
  if(d<=9) return 2;
  return 1;
}
function isLevelUnlocked(lvl1){return totalStars()>=levelGate(lvl1);}
function firstUnplayedIdx(){
  for(let i=0;i<50;i++)if(isLevelUnlocked(i+1)&&!save.levelStars[i+1])return i;
  return 49;
}

// ── SCREEN ROUTING ───────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ── GAME STATE ───────────────────────────────────────
let SIZE=3,grid=[],moves=0,history=[],solution=null;
let hintIdx=null,hintsLeft=3,undosLeft=3,initLit=0,savedGrid=null,parScore=null;
let activeLevelIdx=0; // 0-based

const $=id=>document.getElementById(id);
const gridEl=$('grid');

// ── MENU ─────────────────────────────────────────────
function updateMenu(){
  const ts=totalStars();
  const next=firstUnplayedIdx()+1;
  $('menu-card-title').textContent=ts>0?'Continue':'Play';
  $('menu-card-sub').textContent=ts>0
    ?`★ ${ts} / 150  ·  Next: Level ${next}`
    :'50 levels · 5 chapters · 3-star system';
}
$('menu-play-btn').addEventListener('click',()=>{
  buildLevelSelect();
  showScreen('screen-levels');
});

// ── LEVEL SELECT ─────────────────────────────────────
$('lev-back').addEventListener('click',()=>{updateMenu();showScreen('screen-menu');});

function buildLevelSelect(){
  const ts=totalStars();
  $('lev-stars-badge').textContent=`★ ${ts} / 150`;
  const wrap=$('chapters-wrap');
  wrap.innerHTML='';
  const firstUnplayed=firstUnplayedIdx();

  CHAPTERS.forEach((ch,ci)=>{
    const chGate=ch.gate;
    const unlocked=ts>=chGate;
    let chStars=0;
    for(let i=0;i<10;i++) chStars+=(save.levelStars[ci*10+i+1]||0);

    const sec=document.createElement('div');
    sec.className='ch-section';

    const hdr=document.createElement('div');
    hdr.className='ch-header';
    hdr.innerHTML=`
      <div class="ch-header-row">
        <div class="ch-name">Ch.${ci+1} · ${ch.name}</div>
        <div class="ch-meta">${ch.grid} &nbsp;<span class="ch-stars">★ ${chStars}/30</span></div>
      </div>
      ${!unlocked?`<div class="ch-gate">🔒 <span class="ch-gate-need">${chGate} ★ required</span> — need ${chGate-ts} more</div>`:''}
    `;
    sec.appendChild(hdr);

    const gd=document.createElement('div');
    gd.className='lvl-grid';

    for(let i=0;i<10;i++){
      const idx=ci*10+i; // 0-based
      const lvl=idx+1;
      const stars=save.levelStars[lvl]||0;
      const locked=!unlocked||(lvl===50&&ts<145);
      const isCurr=!locked&&idx===firstUnplayed&&!stars;

      const btn=document.createElement('div');
      btn.className='lvl-btn'+(locked?' locked':'')+(stars===3?' done3':'')+(isCurr?' curr':'');

      if(locked){
        const gateLabel=lvl===50?'145★':'🔒';
        btn.innerHTML=`<div class="lvl-num">${lvl}</div><div class="lvl-lock">${gateLabel}</div>`;
      } else {
        btn.innerHTML=`
          <div class="lvl-num">${lvl}</div>
          <div class="lvl-stars">
            <div class="lvl-dot${stars>=1?' on':''}"></div>
            <div class="lvl-dot${stars>=2?' on':''}"></div>
            <div class="lvl-dot${stars>=3?' on':''}"></div>
          </div>`;
        btn.addEventListener('click',()=>startLevel(idx));
      }
      gd.appendChild(btn);
    }
    sec.appendChild(gd);
    wrap.appendChild(sec);
  });
}

// ── START LEVEL ──────────────────────────────────────
function startLevel(idx){
  activeLevelIdx=idx;
  const lvl=idx+1;
  const ci=Math.floor(idx/10);
  $('game-ch-tag').textContent=`Chapter ${ci+1} · ${CHAPTERS[ci].name}`;
  $('game-lev-tag').textContent=`Level ${lvl}`;
  hintsLeft=3;
  undosLeft=3;
  renderHintCount();
  renderUndoCount();
  showScreen('screen-game');
  initPuzzle();
}

// ── PUZZLE INIT ──────────────────────────────────────
function initPuzzle(){
  clearHint();history=[];moves=0;solution=null;parScore=null;
  const def=LEVEL_DEFS[activeLevelIdx];
  SIZE=def.s;

  const gap=SIZE===3?10:SIZE===4?9:8,pad=16;
  const avail=Math.min(window.innerWidth-40,340);
  const cs=Math.max(44,Math.floor((avail-pad*2-gap*(SIZE-1))/SIZE));
  gridEl.style.gap=gap+'px';gridEl.style.padding=pad+'px';
  gridEl.style.setProperty('--cs',cs+'px');

  // seeded deterministic puzzle
  let attempt=0;
  do{
    const rng=seededRng(activeLevelIdx*2654435761+attempt);
    grid=Array.from({length:SIZE},()=>new Uint8Array(SIZE));
    for(let k=0;k<def.p;k++) applyToggle(~~(rng()*SIZE),~~(rng()*SIZE));
    attempt++;
  }while(!countLit()&&attempt<20);

  initLit=countLit();
  savedGrid=grid.map(r=>r.slice());
  solution=computeSol();
  parScore=solution?solution.reduce((s,v)=>s+v,0):null;
  updateDisplay();renderGrid();
}

function applyToggle(r,c){tog(r,c);tog(r-1,c);tog(r+1,c);tog(r,c-1);tog(r,c+1);}
function tog(r,c){if(r>=0&&r<SIZE&&c>=0&&c<SIZE)grid[r][c]^=1;}
function computeSol(){
  const f=new Uint8Array(SIZE*SIZE);
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)f[r*SIZE+c]=grid[r][c];
  return solveGF2(SIZE,f);
}

// ── RENDER ───────────────────────────────────────────
function renderGrid(){
  const cs=gridEl.style.getPropertyValue('--cs');
  gridEl.style.gridTemplateColumns=`repeat(${SIZE},${cs})`;
  gridEl.innerHTML='';gridEl.classList.remove('win-pulse');
  for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
    const el=document.createElement('div');
    el.className=`cell cell-in${grid[r][c]?' on':''}`;
    el.style.width=el.style.height=cs;
    el.style.animationDelay=(r*SIZE+c)*14+'ms';
    el.dataset.r=r;el.dataset.c=c;
    el.addEventListener('pointerdown',onTap);
    gridEl.appendChild(el);
  }
}
function syncGrid(){
  gridEl.querySelectorAll('.cell').forEach(el=>{
    el.classList.toggle('on',!!grid[+el.dataset.r][+el.dataset.c]);
    el.classList.remove('hint-cell');
  });
  markHint();
}

// ── TAP ──────────────────────────────────────────────
function onTap(e){
  e.preventDefault();
  const el=e.currentTarget,r=+el.dataset.r,c=+el.dataset.c;
  history.push(grid.map(x=>x.slice()));if(history.length>60)history.shift();
  el.classList.remove('tap-dim');void el.offsetWidth;el.classList.add('tap-dim');
  applyToggle(r,c);moves++;
  solution=computeSol();clearHint();
  syncGrid();updateDisplay();checkWin();
}

// ── WIN ───────────────────────────────────────────────
function countLit(){let s=0;for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++)s+=grid[r][c];return s;}

function checkWin(){
  if(countLit())return;
  gridEl.classList.add('win-pulse');
  const lvl=activeLevelIdx+1;
  const earned=parScore!==null?calcStars(moves,parScore):1;
  const prev=save.levelStars[lvl]||0;
  const improved=earned>prev;
  if(improved){save.levelStars[lvl]=earned;writeSave(save);}
  else if(!prev){save.levelStars[lvl]=earned;writeSave(save);}

  // milestone hint every 5 levels
  let bonusHints=0;
  const milestone=lvl%5===0;
  if(milestone&&!save.hintMilestones[lvl]){
    save.hintMilestones[lvl]=true;
    save.hintPool=(save.hintPool||0)+2;
    bonusHints=2;
    writeSave(save);
    renderHintCount();
  }

  setTimeout(()=>showWinSheet(earned,improved,bonusHints),380);
}

function showWinSheet(stars,improved,bonusHints){
  const lvl=activeLevelIdx+1;
  const isLast=lvl===50;

  // star animation
  [$('ws-1'),$('ws-2'),$('ws-3')].forEach((el,i)=>{
    el.classList.remove('lit');
    el.style.color=i<stars?'var(--accent-lt)':'var(--divider)';
  });
  for(let i=0;i<stars;i++){
    setTimeout(()=>$('ws-'+(i+1)).classList.add('lit'),150+i*220);
  }

  $('win-title').textContent=isLast?'The Light Returns':improved?'New Record!':'Level Clear';
  $('win-sub').textContent=isLast?'Mor Cove is safe':
    `Level ${lvl} · Chapter ${Math.ceil(lvl/10)}`;

  const bonus=$('win-bonus');
  if(bonusHints>0){bonus.textContent=`+${bonusHints} Hint Bonus! (Every 5 levels)`;bonus.style.display='block';}
  else{bonus.style.display='none';}

  $('win-moves').textContent=moves;
  const parEl=$('win-par-val');
  if(parScore!==null){
    const d=moves-parScore;
    parEl.textContent=d===0?'Par':d<0?`${d} (Eagle!)`:`+${d}`;
    parEl.className=d<0?'par-under':d===0?'par-at':'par-over';
  }else{parEl.textContent='—';parEl.className='';}
  $('win-best').textContent=save.levelStars[lvl]?`${save.levelStars[lvl]} ★`:'—';

  // next button
  const nextBtn=$('btn-next');
  const nextIdx=activeLevelIdx+1;
  if(isLast){
    nextBtn.textContent='Menu';
    nextBtn.onclick=()=>{$('overlay-win').classList.remove('show');updateMenu();showScreen('screen-menu');};
  } else if(nextIdx<50&&isLevelUnlocked(nextIdx+1)){
    nextBtn.textContent=`Level ${nextIdx+1}`;
    nextBtn.onclick=()=>{$('overlay-win').classList.remove('show');startLevel(nextIdx);};
  } else {
    nextBtn.textContent='Levels';
    nextBtn.onclick=()=>{$('overlay-win').classList.remove('show');buildLevelSelect();showScreen('screen-levels');};
  }

  $('btn-to-levels').onclick=()=>{
    $('overlay-win').classList.remove('show');
    buildLevelSelect();showScreen('screen-levels');
  };
  $('overlay-win').classList.add('show');
}

// ── DISPLAY ───────────────────────────────────────────
function updateDisplay(){
  const lit=countLit();
  $('moves-display').textContent=moves;
  $('lit-display').textContent=lit;
  $('par-display').textContent=parScore!==null?parScore:'—';
  const p=initLit>0?((initLit-lit)/initLit)*100:0;
  $('progress-bar').style.width=Math.max(0,Math.min(100,p))+'%';
  const badge=$('par-badge');
  if(parScore!==null&&moves>0){
    const d=moves-parScore;
    badge.textContent=d===0?'Par':d<0?`${d}`:`+${d}`;
    badge.className='par-badge'+(d<0?' under':d===0?' at':' over');
  }else{badge.textContent=`Par ${parScore!==null?parScore:'—'}`;badge.className='par-badge';}
}

// ── HINT ─────────────────────────────────────────────
function showHint(){
  const total=hintsLeft+(save.hintPool||0);
  if(total<=0){openStore();return;}
  clearHint();
  solution=computeSol();
  let idx=null;
  if(solution){
    let best=-Infinity;
    for(let i=0;i<solution.length;i++){
      if(!solution[i])continue;
      const r=~~(i/SIZE),c=i%SIZE;
      const before=countLit();applyToggle(r,c);
      const gain=before-countLit();applyToggle(r,c);
      if(gain>best){best=gain;idx=i;}
    }
  }
  if(idx===null){
    let bd=-Infinity,bl=countLit();
    for(let r=0;r<SIZE;r++)for(let c=0;c<SIZE;c++){
      applyToggle(r,c);const al=countLit();applyToggle(r,c);
      if(bl-al>bd){bd=bl-al;idx=r*SIZE+c;}
    }
  }
  if(idx===null)return;
  if(hintsLeft>0)hintsLeft--;
  else save.hintPool=Math.max(0,(save.hintPool||0)-1);
  save.hintsUsed=(save.hintsUsed||0)+1;writeSave(save);
  hintIdx=idx;markHint();renderHintCount();
  $('btn-hint').classList.add('hinting');
  toast('Hint');
}
function renderHintCount(){
  const t=hintsLeft+(save.hintPool||0);
  const el=$('hint-count');el.textContent='×'+t;
  el.className='hint-count'+(t===0?' empty':'');
}
function renderUndoCount(){
  const t=undosLeft+(save.undoPool||0);
  const el=$('undo-count');el.textContent='×'+t;
  el.className='undo-count'+(t===0?' empty':'');
}
function markHint(){
  if(hintIdx===null)return;
  const el=gridEl.querySelector(`[data-r="${~~(hintIdx/SIZE)}"][data-c="${hintIdx%SIZE}"]`);
  if(el)el.classList.add('hint-cell');
}
function clearHint(){
  gridEl.querySelectorAll('.hint-cell').forEach(el=>el.classList.remove('hint-cell'));
  hintIdx=null;$('btn-hint').classList.remove('hinting');
}

// ── UNDO / RESTART ────────────────────────────────────
function undo(){
  if(!history.length){
    gridEl.classList.add('shake');setTimeout(()=>gridEl.classList.remove('shake'),280);
    toast('Nothing to undo',true);return;
  }
  const total=undosLeft+(save.undoPool||0);
  if(total<=0){openStore('undos');return;}
  if(undosLeft>0)undosLeft--;
  else save.undoPool=Math.max(0,(save.undoPool||0)-1);
  writeSave(save);
  grid=history.pop();moves=Math.max(0,moves-1);
  solution=computeSol();clearHint();syncGrid();updateDisplay();
  renderUndoCount();
}
function restart(){
  if(!savedGrid)return;
  clearHint();history=[];moves=0;
  grid=savedGrid.map(r=>r.slice());initLit=countLit();
  solution=computeSol();syncGrid();updateDisplay();toast('Restarted');
}

// ── BACK ─────────────────────────────────────────────
$('game-back-btn').addEventListener('click',()=>{
  $('overlay-win').classList.remove('show');
  buildLevelSelect();showScreen('screen-levels');
});

// ── DAILY HINT ───────────────────────────────────────
function checkDailyHint(){
  const today=new Date().toISOString().slice(0,10);
  if(save.lastDailyHint!==today){
    save.lastDailyHint=today;
    save.hintPool=(save.hintPool||0)+1;
    writeSave(save);
    setTimeout(()=>toast('Daily hint added! 💡'),800);
  }
}

// ── TOAST ────────────────────────────────────────────
let _tt;
function toast(msg,alt=false){
  const el=$('toast');el.textContent=msg;
  el.className=`toast show${alt?' alt':''}`;
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),1800);
}

// ── CONTROLS ─────────────────────────────────────────
$('btn-hint').addEventListener('click',showHint);
$('btn-restart').addEventListener('click',restart);
$('btn-undo').addEventListener('click',undo);
gridEl.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

// ── ZOOM PREVENTION ──────────────────────────────────
document.addEventListener('gesturestart',e=>e.preventDefault(),false);
document.addEventListener('gesturechange',e=>e.preventDefault(),false);
document.addEventListener('gestureend',e=>e.preventDefault(),false);
document.addEventListener('touchmove',e=>{if(e.touches.length>1)e.preventDefault();},{passive:false});

// ── IAP STORE ────────────────────────────────────────
const IAP_PACKS=[
  {hints:10,bonus:0,price:'0.99'},
  {hints:50,bonus:3,price:'4.99'},
  {hints:100,bonus:9,price:'9.99'},
  {hints:1000,bonus:30,price:'79.99'},
];
const UNDO_PACKS=[
  {undos:20,bonus:0,price:'0.99'},
  {undos:100,bonus:6,price:'4.99'},
  {undos:200,bonus:18,price:'9.99'},
  {undos:2000,bonus:60,price:'79.99'},
];
let _storeTab='hints';
function openStore(tab='hints'){
  _storeTab=tab;
  buildStoreTab(tab);
  $('overlay-store').classList.add('show');
}
function buildStoreTab(tab){
  _storeTab=tab;
  $('tab-hints').classList.toggle('active',tab==='hints');
  $('tab-undos').classList.toggle('active',tab==='undos');
  const list=$('iap-list');list.innerHTML='';
  if(tab==='hints'){
    IAP_PACKS.forEach(pack=>{
      const total=pack.hints+pack.bonus;
      const row=document.createElement('div');row.className='iap-row';
      row.innerHTML=`
        <div class="iap-info">
          <div class="iap-label">${pack.hints}${pack.bonus?` <em class="iap-bonus">+${pack.bonus} bonus</em>`:''} Hints</div>
        </div>
        <div class="iap-right">
          <span class="iap-price">$${pack.price}</span>
          <div class="spinner"></div><span class="success-check">✓</span>
        </div>`;
      row.addEventListener('click',()=>simulatePurchase(row,total,'hints'));
      list.appendChild(row);
    });
  } else {
    UNDO_PACKS.forEach(pack=>{
      const total=pack.undos+pack.bonus;
      const row=document.createElement('div');row.className='iap-row';
      row.innerHTML=`
        <div class="iap-info">
          <div class="iap-label">${pack.undos}${pack.bonus?` <em class="iap-bonus">+${pack.bonus} bonus</em>`:''} Undos</div>
        </div>
        <div class="iap-right">
          <span class="iap-price">$${pack.price}</span>
          <div class="spinner"></div><span class="success-check">✓</span>
        </div>`;
      row.addEventListener('click',()=>simulatePurchase(row,total,'undos'));
      list.appendChild(row);
    });
  }
}
function closeStore(){$('overlay-store').classList.remove('show');}
function simulatePurchase(row,total,type){
  $('iap-list').querySelectorAll('.iap-row').forEach(r=>r.style.pointerEvents='none');
  row.classList.add('processing');
  setTimeout(()=>{
    row.classList.remove('processing');row.classList.add('success');
    if(type==='hints'){
      save.hintPool=(save.hintPool||0)+total;writeSave(save);renderHintCount();
      setTimeout(()=>{closeStore();toast(`+${total} hints added!`);},800);
    } else {
      save.undoPool=(save.undoPool||0)+total;writeSave(save);renderUndoCount();
      setTimeout(()=>{closeStore();toast(`+${total} undos added!`);},800);
    }
  },1600);
}
$('btn-store').addEventListener('click',()=>openStore('hints'));
$('btn-store-close').addEventListener('click',closeStore);
$('tab-hints').addEventListener('click',()=>buildStoreTab('hints'));
$('tab-undos').addEventListener('click',()=>buildStoreTab('undos'));

// ── BOOT ─────────────────────────────────────────────
checkDailyHint();
updateMenu();
showScreen('screen-menu');
</script>
